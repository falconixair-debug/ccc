<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>No-Login Chat</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
    #chat { flex: 1; overflow-y: auto; padding: 10px; background: #f5f5f5; }
    #messageForm { display: flex; border-top: 1px solid #ccc; }
    #messageInput { flex: 1; padding: 10px; border: none; outline: none; }
    #sendBtn { padding: 10px 20px; border: none; background: #007bff; color: white; cursor: pointer; }
    #sendBtn:hover { background: #0056b3; }
    .msg { margin-bottom: 8px; }
    .name { font-weight: bold; margin-right: 4px; }
    .self { color: #007bff; }
  </style>
</head>
<body>
  <div id="chat"></div>
  <form id="messageForm">
    <input id="messageInput" autocomplete="off" placeholder="Type a message..." />
    <button id="sendBtn" type="submit">Send</button>
  </form>

  <script>
    const username = prompt('Enter a name (no login needed):') || 'Guest-' + Math.floor(Math.random() * 1000);
    const chat = document.getElementById('chat');
    const form = document.getElementById('messageForm');
    const input = document.getElementById('messageInput');

    const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
    const socket = new WebSocket(`${protocol}://${location.host}`);

    socket.addEventListener('message', (event) => {
      const data = JSON.parse(event.data);
      addMessage(data.username, data.text);
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text || socket.readyState !== WebSocket.OPEN) return;

      const msg = { username, text };
      socket.send(JSON.stringify(msg));
      input.value = '';
    });

    function addMessage(name, text) {
      const div = document.createElement('div');
      div.className = 'msg';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'name' + (name === username ? ' self' : '');
      nameSpan.textContent = name + ':';
      const textSpan = document.createElement('span');
      textSpan.textContent = ' ' + text;
      div.appendChild(nameSpan);
      div.appendChild(textSpan);
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }
  </script>
</body>
</html>
